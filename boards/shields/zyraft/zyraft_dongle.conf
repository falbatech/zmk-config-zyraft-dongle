# Zyra FT dongle - z wyświetlaczem GC9A01 i logo FalbaTech

# Display aktywny
CONFIG_ZMK_DISPLAY=y
CONFIG_LV_USE_IMAGE=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_28=y
CONFIG_LV_USE_ARC=y
CONFIG_LV_USE_LABEL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Custom status screen (nasz override)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# LVGL memory pool zwiększony dla logo
CONFIG_LV_Z_MEM_POOL_SIZE=32768
CONFIG_LV_Z_VDB_SIZE=10

# Enable BLE and USB
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# Dongle nie spi
CONFIG_ZMK_SLEEP=n

# BT power boost
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 2 peripherals: lewa + prawa
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# 5 BT profili + 2 peripherals = 7
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# Battery level reporting
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Mouse keys
CONFIG_ZMK_POINTING=y

# BLE passkey
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y
